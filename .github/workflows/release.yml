name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write   # for GitHub Release creation
  packages: write   # not strictly required for nuget.org but kept for symmetry

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-progress release

jobs:
  publish:
    name: Build, pack & publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: nuget
      url: https://www.nuget.org/packages/LogAssertions.TUnit/

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CSPROJ_VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/LogAssertions.TUnit/LogAssertions.TUnit.csproj)
          if [ "$TAG_VERSION" != "$CSPROJ_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match csproj <Version> ($CSPROJ_VERSION)"
            exit 1
          fi
          echo "Tag and csproj agree on version $TAG_VERSION"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet run --project tests/LogAssertions.TUnit.Tests/LogAssertions.TUnit.Tests.csproj --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/LogAssertions.TUnit/LogAssertions.TUnit.csproj --configuration Release --no-build --output ./artifacts

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
